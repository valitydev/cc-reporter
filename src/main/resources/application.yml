server:
  port: ${server.port}

spring:
  application:
    name: ${project.name}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    url: ${db.url}
    username: ${db.user}
    password: ${db.password}
    hikari:
      idle-timeout: 30000
      maximum-pool-size: 2
      data-source-properties:
        reWriteBatchedInserts: true
  flyway:
    enabled: true
    schemas: ${db.schema}
    postgresql:
      transactional-lock: false
  kafka:
    bootstrap-servers: localhost:9092
    client-id: cc-reporter
    consumer:
      group-id: cc-reporter
      enable-auto-commit: false
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 20
      properties:
        max.poll.interval.ms: 30000
        session.timeout.ms: 30000
    listener:
      ack-mode: manual
      poll-timeout: 3000ms

management:
  server:
    port: ${management.port}
  metrics:
    export:
      prometheus:
        enabled: false
    tags:
      application: ${project.name}
  endpoint:
    health:
      enabled: false
      probes:
        enabled: false
      show-details: never
    metrics:
      enabled: false
    prometheus:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      discovery:
        enabled: false

ccr:
  kafka:
    consumer:
      dominant-concurrency: 1
      payments-concurrency: 1
      withdrawals-concurrency: 1
      withdrawal-sessions-concurrency: 1
      error-backoff-interval-ms: 30000
      error-max-attempts: -1
      dominant-error-backoff-interval-ms: 30000
      dominant-error-max-attempts: -1
    topics:
      dominant:
        id: ""
        enabled: false
      payments:
        id: ""
        enabled: false
      withdrawals:
        id: ""
        enabled: false
      withdrawal-sessions:
        id: ""
        enabled: false
  scheduler:
    enabled: false
    poll-interval-ms: 10000
    lock-timeout-ms: 30000
    stale-processing-timeout-ms: 300000
  report:
    max-attempts: 5
    presigned-url-ttl-sec: 900
    expiration-sec: 604800
  api:
    path: /ccreports
    created-by-header: X-User-Id
    default-page-size: 50
    max-page-size: 100
  storage:
    file-storage:
      url: ""
      networkTimeout: 5000
